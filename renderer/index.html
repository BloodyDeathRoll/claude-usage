<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Claude Usage</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">

  <div id="titlebar">
    <div id="title-left">
      <span id="title-grip">⠿</span>
      <span id="title-label">Claude Usage</span>
    </div>
    <div id="title-actions">
      <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
      <button class="icon-btn" id="btn-minimize" title="Minimize">−</button>
    </div>
  </div>

  <div id="body">

    <!-- Session (base) -->
    <div class="usage-row">
      <div class="row-header">
        <span class="row-label">Session</span>
        <span class="row-right">
          <span class="row-value" id="session-value">—</span><span class="row-limit" id="session-limit"></span>
        </span>
      </div>
      <div class="progress-track">
        <div class="progress-fill no-limit" id="session-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- Extra usage (hidden until > 0) -->
    <div class="usage-row extra-row" id="row-extra" style="display:none">
      <div class="row-header">
        <span class="row-label extra-label">+Extra</span>
        <span class="row-right">
          <span class="row-value extra-value" id="extra-value">—</span>
        </span>
      </div>
      <div class="progress-track">
        <div class="progress-fill extra-fill" id="extra-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- Weekly rows — populated dynamically per model -->
    <div id="weekly-rows"></div>

  </div>

  <div id="no-data">No Claude Code<br>data found</div>

  <div id="footer">
    <span id="reset-timer"></span>
    <span id="last-sync"></span>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel">
    <div id="settings-title">Settings</div>
    <div class="setting-row">
      <span class="setting-label">Plan</span>
      <div class="plan-buttons">
        <button class="plan-btn" data-plan="pro"
          data-session="320000"
          data-weekly-sonnet="436000"
          data-weekly-haiku="25000"
          data-weekly-opus="0">Pro</button>
        <button class="plan-btn" data-plan="max5"
          data-session="1600000"
          data-weekly-sonnet="2180000"
          data-weekly-haiku="125000"
          data-weekly-opus="0">Max5</button>
        <button class="plan-btn" data-plan="max20"
          data-session="6400000"
          data-weekly-sonnet="8720000"
          data-weekly-haiku="500000"
          data-weekly-opus="0">Max20</button>
        <button class="plan-btn" data-plan="custom"
          data-session=""
          data-weekly-sonnet=""
          data-weekly-haiku=""
          data-weekly-opus="">Custom</button>
      </div>
    </div>
    <div class="setting-row" id="custom-row" style="display:none">
      <span class="setting-label">Session&nbsp;limit</span>
      <input class="custom-input" id="custom-session" type="number" placeholder="330000" min="1000" />
    </div>
    <div class="settings-actions">
      <button class="btn-sm" id="btn-no-limit">No limit</button>
      <button class="btn-sm" id="btn-settings-cancel">Cancel</button>
      <button class="btn-sm primary" id="btn-settings-save">Save</button>
    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
